<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Globe background -->
  <circle cx="16" cy="16" r="15" fill="#c45d3e"/>
  <circle cx="16" cy="16" r="15" fill="none" stroke="#a84832" stroke-width="0.5"/>

  <!-- Globe lines - longitude -->
  <ellipse cx="16" cy="16" rx="6" ry="14.5" fill="none" stroke="#faf8f5" stroke-width="0.7" opacity="0.3"/>
  <ellipse cx="16" cy="16" rx="11" ry="14.5" fill="none" stroke="#faf8f5" stroke-width="0.7" opacity="0.3"/>

  <!-- Globe lines - latitude -->
  <ellipse cx="16" cy="10" rx="13.5" ry="3" fill="none" stroke="#faf8f5" stroke-width="0.7" opacity="0.3"/>
  <ellipse cx="16" cy="22" rx="13.5" ry="3" fill="none" stroke="#faf8f5" stroke-width="0.7" opacity="0.3"/>
  <line x1="1.5" y1="16" x2="30.5" y2="16" stroke="#faf8f5" stroke-width="0.7" opacity="0.3"/>

  <!-- TL initials -->
  <text x="16" y="20.5" font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="13" fill="#faf8f5" text-anchor="middle" letter-spacing="-0.5">TL</text>
</svg>
